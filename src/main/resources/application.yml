server:
  port: 8080
  servlet:
    contextPath: /vendas-api/v1
spring:
  application:
    name: vendas-api
  datasource:
    primary:
      jdbc-url: jdbc:postgresql://trolley.proxy.rlwy.net:34834/postgres
      username: postgres
      password: NgcDhWoXyCFLaGThnnnnOQIVqeVQdXxJ
      driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true
